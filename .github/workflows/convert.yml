name: Convert OISD lists

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/convert.yml"
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install dnspython tldextract

      - name: Update and validate lists
        run: bash scripts/update.sh

      - name: Commit updated lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/ .last-validated-letter .gitattributes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update OISD plain lists [skip ci]"
            git push
          fi
