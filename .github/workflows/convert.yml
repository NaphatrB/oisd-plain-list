name: Convert OISD lists

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/convert.yml"
      - "scripts/convert.sh"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert lists
        run: bash scripts/convert.sh lists

      - name: Commit updated lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update OISD plain lists [skip ci]"
            git push
          fi

